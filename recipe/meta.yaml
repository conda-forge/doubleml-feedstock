{% set name = "doubleml" %}
{% set version = "0.11.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/D/DoubleML/{{ name }}-{{ version }}.tar.gz
  sha256: 9dc65f93a9d6616de9be03fd49de38cd6990a91eb90eada67663cecc54d82277

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - joblib >=1.2.0
    - numpy >=2.0.0
    - pandas >=2.0.0
    - scipy >=1.7.0
    - scikit-learn >=1.6.0
    - statsmodels >=0.14.0
    - optuna >=4.6.0
    - matplotlib-base >=3.9.0
    - seaborn >=0.13
    - plotly >=5.0.0

test:
  requires:
    - pytest >=8.3.0
    - xgboost >=2.1.0
    - lightgbm >=4.5.0
    - python {{ python_min }}
  commands:
    - pytest --pyargs doubleml -m ci
  imports:
    - doubleml

about:
  home: https://docs.doubleml.org
  license: BSD-3-Clause
  license_file: LICENSE
  summary: Double Machine Learning in Python
  description: |
    The Python package DoubleML provides an implementation of the double / debiased machine learning framework of
    Chernozhukov et al. (2018). It is built on top of scikit-learn (Pedregosa et al., 2011).
  doc_url: https://docs.doubleml.org/stable/
  dev_url: https://github.com/DoubleML/doubleml-for-py

extra:
  recipe-maintainers:
    - SvenKlaassen
    - PhilippBach
    - MalteKurz
